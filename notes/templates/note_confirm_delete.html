{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Delete note</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <h1>Delete note</h1>

    <form method="post">
        {% csrf_token %}
        <p>Are you sure you want to delete "{{ note }}"?</p>
        <button type="submit">Yes, delete</button>
    </form>

    <p><a href="{% url 'notes_list' %}">Cancel</a></p>
</body>
</html>
