{% extends 'base.html' %}

{% block title %}Note Details{% endblock %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <h1 class="card-title">{{ note.title }}</h1>

        <p><strong>Text:</strong> {{ note.text }}</p>
        <p><strong>Reminder:</strong> {{ note.reminder }}</p>
        <p><strong>Category:</strong> {{ note.category.title }}</p>

        {% if user.is_authenticated %}
            <a href="{% url 'note_edit' note.pk %}" class="btn btn-warning">Edit</a>
            <a href="{% url 'note_delete' note.pk %}" class="btn btn-danger">Delete</a>
        {% endif %}
        <a href="{% url 'notes_list' %}" class="btn btn-secondary">Back</a>
    </div>
</div>
{% endblock %}
