{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Notes App</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <h1>Notes list</h1>

    {% for note in notes %}
        <div>
            <h2>{{ note.title }}</h2>
            <p>{{ note.text }}</p>
            <p>Category: {{ note.category.title }}</p>
            <p>Reminder: {{ note.reminder }}</p>
            <br>
        </div>
    {% endfor %}
</body>
</html>
