{% extends 'base.html' %}

{% block title %}Note Form{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="card-title mb-4">Create / Edit Note</h1>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">{{ form.title.label }}</label>
                        {{ form.title }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">{{ form.text.label }}</label>
                        {{ form.text }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">{{ form.reminder.label }}</label>
                        {{ form.reminder }}
                        <div class="form-text">
                            Format: YYYY-MM-DD HH:MM
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">{{ form.category.label }}</label>
                        {{ form.category }}
                    </div>

                    <button type="submit" class="btn btn-success">Save</button>
                    <a href="{% url 'notes_list' %}" class="btn btn-secondary">Back</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
